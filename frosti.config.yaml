# 站点基础信息
site:
  tab: "ink 的博客"
  title: "ink 的博客"
  description: "记录技术、想法和生活"
  language: "zh-CN"
  favicon: "/favicon.ico"
  theme:
    light: winter
    dark: dracula
    code: github-dark
  date_format: ddd MMM DD YYYY
  blog:
    pageSize: 8
  menu:
    - id: home
      text: 首页
      href: /
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: 关于
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: 博客
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      subItems:
        - id: all
          text: 所有博客
          href: /blog
          svg: "material-symbols:ink-pen-outline-rounded"
          target: _self

# 用户信息
user:
  name: ink
  site: "https://inkovo.pages.dev"
  avatar: /profile.png
  sidebar:
    social:
      - href: "https://github.com/NotBocchi"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
      - href: "https://space.bilibili.com/405549514"
        ariaLabel: BiliBili
        title: BiliBili
        svg: "ri:bilibili-line"
  footer:
    social:
      - href: "https://github.com/NotBocchi"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
      - href: "https://space.bilibili.com/405549514"
        ariaLabel: BiliBili
        title: BiliBili
        svg: "ri:bilibili-line"
